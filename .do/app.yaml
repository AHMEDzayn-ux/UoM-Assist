name: uom-backend
region: nyc
services:
  - name: backend
    github:
      repo: AHMEDzayn-ux/UoM-Assist
      branch: main
      deploy_on_push: true
    source_dir: backend
    dockerfile_path: backend/Dockerfile
    http_port: 8080
    # ~2GB RAM. The 512MB/1GB tiers OOM'd for Nexus (embedding + models don't
    # fit); 2GB is the proven size. Verify the exact slug/price in the DO console
    # (DO renames these over time — pick the ~2GB "Basic" or "Professional" tier).
    instance_size_slug: basic-s
    instance_count: 1
    envs:
      - key: ENVIRONMENT
        value: production
        scope: RUN_TIME
      - key: LOG_LEVEL
        value: INFO
        scope: RUN_TIME
      # The ~25MB uom FAISS index + rag_system.db (uom client, domain=university)
      # ship inside the image, so the assistant works on first boot with no
      # ingestion step. At 2GB you can flip this to "true" for cross-encoder
      # re-ranking (better answers); it was "false" only because 1GB was too tight.
      - key: USE_RERANKING
        value: "false"
        scope: RUN_TIME
      - key: GROQ_API_KEY
        type: SECRET
        scope: RUN_TIME
      - key: GOOGLE_API_KEY
        type: SECRET
        scope: RUN_TIME
      - key: JWT_SECRET
        type: SECRET
        scope: RUN_TIME
      - key: ADMIN_EMAIL
        type: SECRET
        scope: RUN_TIME
      - key: ADMIN_PASSWORD
        type: SECRET
        scope: RUN_TIME
